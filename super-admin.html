<!DOCTYPE html>
<html>
<head>
  <title>GreenCRM Super Admin</title>
</head>
<body style="font-family: Arial; padding: 40px;">
  <h1>GreenCRM Super Admin</h1>
  <p id="status">Starting...</p>
  <div id="orgs"></div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <script>
    document.getElementById("status").textContent = "Script running...";

    const SUPABASE_URL = "https://nznfrxzgvcjhfsdaphyp.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56bmZyeHpndmNqaGZzZGFwaHlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MjQzNzcsImV4cCI6MjA5MjQwMDM3N30.vDlv1aVF4MlXPJ_VCWvyWWYYqovwJxUvNnwwUgYXSyw";

    if (!window.supabase) {
      document.getElementById("status").textContent = "Supabase library did not load";
    } else {
      const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      async function loadOrganisations() {
        document.getElementById("status").textContent = "Loading organisations...";

        const { data, error } = await client
          .from("organisations")
          .select("*");

        if (error) {
          document.getElementById("status").textContent = "Error loading organisations";
          document.getElementById("orgs").innerHTML =
            "<pre>" + JSON.stringify(error, null, 2) + "</pre>";
          return;
        }

        document.getElementById("status").textContent = "Loaded successfully";

        document.getElementById("orgs").innerHTML = data.map(org => `
          <div style="border:1px solid #ddd; padding:15px; margin:10px 0; border-radius:8px;">
            <h3>${org.name || "Unnamed organisation"}</h3>
            <p>Sector: ${org.sector || "N/A"}</p>
            <p>Plan: ${org.plan || "free"}</p>
            <p>Status: ${org.status || "active"}</p>
          </div>
        `).join("");
      }

      loadOrganisations();
    }
  </script>
</body>
</html>
