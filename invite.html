<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Accept Invitation · Civara</title>
<link rel="icon" type="image/png" href="logo.png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F1EA;
  --surface:#FFFFFF;
  --card:#FAF7F1;
  --border:#E5DFD3;
  --border-strong:#CFC6B3;
  --em:#1F6F6D;
  --em2:#175553;
  --em3:#2A9D8F;
  --txt:#1F2A28;
  --txt2:#4F5B58;
  --txt3:#7A857F;
  --red:#B91C1C;
  --red-bg:#FEF2F2;
  --amber:#F59E0B;
  --amber-bg:#FEF3C7;
  --blue:#1D4ED8;
  --blue-bg:#EFF6FF;
  --green:#15803D;
  --green-bg:#F0FDF4;
  --purple:#6D28D9;
  --purple-bg:#F5F3FF;
  --radius:10px;
  --radiuslg:14px;
  --shadow:0 1px 2px rgba(31,42,40,.04),0 4px 12px rgba(31,42,40,.06);
  --shadow-lg:0 4px 16px rgba(31,42,40,.08),0 12px 32px rgba(31,42,40,.10);
}
body{background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
button{cursor:pointer;border:none;font-family:inherit}
input{font-family:inherit;font-size:14px;background:var(--surface);border:1px solid var(--border-strong);color:var(--txt);border-radius:var(--radius);padding:10px 13px;width:100%;outline:none;transition:border-color .15s,box-shadow .15s}
input:focus{border-color:var(--em);box-shadow:0 0 0 3px rgba(31,111,109,.12)}
label{display:block;font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;font-weight:600}
.btn{padding:11px 16px;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;border:none;width:100%;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;font-family:inherit}
.btn-p{background:var(--em);color:#fff}.btn-p:hover{background:var(--em2)}
.btn-ghost{background:var(--surface);color:var(--txt2);border:1px solid var(--border-strong)}.btn-ghost:hover{border-color:var(--em);color:var(--em)}
.wrap{max-width:440px;width:100%}
.brand{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:6px}
.brand img{height:42px;width:auto;display:block}
.tag{font-size:13px;color:var(--txt3);text-align:center;margin-bottom:24px;font-weight:500}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radiuslg);padding:30px;box-shadow:var(--shadow-lg)}
.headline{font-size:20px;font-weight:800;color:var(--txt);margin-bottom:6px;letter-spacing:-.3px}
.sub{font-size:13px;color:var(--txt3);margin-bottom:20px}
.invite-info{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:20px}
.role-pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px}
.role-manager{background:var(--green-bg);color:var(--green)}
.role-advisor{background:var(--blue-bg);color:var(--blue)}
.role-admin{background:var(--purple-bg);color:var(--purple)}
.form-row{margin-bottom:14px}
.alert{padding:12px;border-radius:var(--radius);font-size:13px;margin-bottom:14px;line-height:1.6}
.alert-err{background:var(--red-bg);border:1px solid #FECACA;color:var(--red)}
.alert-ok{background:var(--green-bg);border:1px solid #BBF7D0;color:var(--green)}
.alert-info{background:var(--blue-bg);border:1px solid #BFDBFE;color:var(--blue)}
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px}
.tab-btn{padding:11px 0;flex:1;cursor:pointer;border:none;background:none;color:var(--txt3);font-family:inherit;font-size:13px;font-weight:600;border-bottom:2px solid transparent;transition:all .15s}
.tab-btn:hover{color:var(--txt2)}
.tab-btn.active{color:var(--em);border-bottom-color:var(--em)}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--em);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.center{text-align:center;padding:30px 20px}
.success-icon{font-size:44px;margin-bottom:12px;color:var(--em)}
a{color:var(--em);text-decoration:none}
a:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="wrap">
  <div class="brand"><img src="logo.png" alt="Civara"/></div>
  <div class="tag">Accept your invitation</div>

  <div id="loading" class="card">
    <div class="center"><span class="spinner"></span> Validating invitation…</div>
  </div>

  <div id="error" class="card" style="display:none">
    <div class="alert alert-err" id="error-msg">Invitation not found.</div>
    <a href="index.html" class="btn btn-ghost" style="text-decoration:none">← Back to home</a>
  </div>

  <div id="form" class="card" style="display:none">
    <div class="headline">You've been invited!</div>
    <div class="sub" id="form-sub"></div>

    <div class="invite-info">
      <div style="font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:600">Invitation details</div>
      <div style="font-size:14px;color:var(--txt);font-weight:700" id="inv-org">—</div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:6px"><span style="font-size:12px;color:var(--txt3)">Role:</span><span id="inv-role-badge"></span></div>
      <div style="font-size:11px;color:var(--txt3);margin-top:6px">For: <span id="inv-email" style="color:var(--txt2);font-weight:500"></span></div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" id="tab-signup" onclick="switchTab('signup')">Create account</button>
      <button class="tab-btn" id="tab-signin" onclick="switchTab('signin')">I have an account</button>
    </div>

    <div id="msg-area"></div>

    <!-- SIGN UP -->
    <div id="signup-form">
      <div class="form-row"><label>Email</label><input type="email" id="su-email" readonly style="opacity:.7;background:var(--card)"/></div>
      <div class="form-row"><label>Choose a password</label><input type="password" id="su-pass" placeholder="Min 8 characters" autocomplete="new-password"/></div>
      <button class="btn btn-p" id="su-btn" onclick="doSignUp()">Create account & accept invite</button>
    </div>

    <!-- SIGN IN -->
    <div id="signin-form" style="display:none">
      <div class="form-row"><label>Email</label><input type="email" id="si-email" readonly style="opacity:.7;background:var(--card)"/></div>
      <div class="form-row"><label>Your password</label><input type="password" id="si-pass" placeholder="••••••••" autocomplete="current-password"/></div>
      <button class="btn btn-p" id="si-btn" onclick="doSignIn()">Sign in & accept invite</button>
    </div>
  </div>

  <div id="success" class="card" style="display:none">
    <div class="center">
      <div class="success-icon">✓</div>
      <div class="headline" style="text-align:center">You're in!</div>
      <div class="sub" style="text-align:center">Welcome to <span id="success-org">your team</span>.</div>
      <a href="app.html" class="btn btn-p" style="text-decoration:none;margin-top:8px">Open the CRM →</a>
    </div>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
'use strict';
const SB_URL='https://nznfrxzgvcjhfsdaphyp.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56bmZyeHpndmNqaGZzZGFwaHlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MjQzNzcsImV4cCI6MjA5MjQwMDM3N30.vDlv1aVF4MlXPJ_VCWvyWWYYqovwJxUvNnwwUgYXSyw';

let sb=null;
function initSupabase(){
  if(sb)return sb;
  if(!window.supabase){console.error('Supabase library not loaded');return null}
  try{sb=window.supabase.createClient(SB_URL,SB_KEY);return sb;}
  catch(e){console.error('Supabase init failed:',e);return null;}
}
initSupabase();

const $=id=>document.getElementById(id);

let invitation=null,orgName='your organisation';
// FIX #2: re-entry guard for double-click protection
let _accepting=false;

function showOnly(id){['loading','error','form','success'].forEach(x=>$(x).style.display='none');$(id).style.display='block';}
function showError(msg){$('error-msg').textContent=msg;showOnly('error');}

async function boot(){
  if(!sb){showError('Authentication service is unavailable. Please try again later.');return;}

  // FIX #4: handle both ?token= and #token= formats defensively
  let token=new URLSearchParams(window.location.search).get('token');
  if(!token && window.location.hash){
    token=new URLSearchParams(window.location.hash.replace(/^#/,'')).get('token');
  }
  if(!token){showError('No invitation token in the link. Please use the link your team sent you.');return;}

  // Look up invitation
  const{data,error}=await sb.from('invitations').select('id,org_id,email,role,token,expires_at,accepted_at').eq('token',token).maybeSingle();
  if(error){showError('Could not validate the invitation: '+error.message);return;}
  if(!data){showError('This invitation link is invalid or has already been used.');return;}
  if(data.accepted_at){showError('This invitation has already been accepted. Please sign in to the CRM directly.');return;}
  if(new Date(data.expires_at)<new Date()){showError('This invitation has expired. Please ask for a new one.');return;}

  invitation=data;

  // get org name and verify org still exists
  const{data:org,error:orgErr}=await sb.from('organisations').select('name').eq('id',data.org_id).maybeSingle();
  if(orgErr){showError('Could not load the organisation for this invitation: '+orgErr.message);return;}
  if(!org){showError('The organisation for this invitation no longer exists. Please ask for a new invitation.');return;}
  orgName=org.name;

  // Pre-fill form
  $('inv-org').textContent=orgName;
  $('inv-email').textContent=data.email;
  $('inv-role-badge').innerHTML='<span class="role-pill role-'+data.role+'">'+data.role+'</span>';
  $('su-email').value=data.email;
  $('si-email').value=data.email;
  $('form-sub').textContent='Set up your account below to join '+orgName+'.';

  // If user is already signed in with a different email, sign them out
  const{data:{session}}=await sb.auth.getSession();
  if(session && session.user.email && session.user.email.toLowerCase()!==data.email.toLowerCase()){
    await sb.auth.signOut();
  }

  showOnly('form');
}

function switchTab(t){
  $('tab-signup').classList.toggle('active',t==='signup');
  $('tab-signin').classList.toggle('active',t==='signin');
  $('signup-form').style.display=t==='signup'?'block':'none';
  $('signin-form').style.display=t==='signin'?'block':'none';
  $('msg-area').innerHTML='';
}

function showMsg(html,type){
  $('msg-area').innerHTML='<div class="alert alert-'+type+'">'+html+'</div>';
}

async function acceptInvitation(userId){
  // Insert membership
  const{error:memErr}=await sb.from('memberships').insert([{
    user_id:userId,
    org_id:invitation.org_id,
    role:invitation.role,
    status:'active',
    joined_at:new Date().toISOString()
  }]);
  // FIX #1: use Postgres SQLSTATE code (23505 = unique_violation) instead of fragile string match.
  // Membership already exists is fine — that's the whole point of accepting an invite.
  if(memErr && memErr.code !== '23505'){
    throw new Error('Could not add you to the organisation: '+memErr.message);
  }

  // Mark invitation accepted
  await sb.from('invitations').update({accepted_at:new Date().toISOString()}).eq('id',invitation.id);
}

async function doSignUp(){
  // FIX #2: re-entry guard prevents double-click race condition
  if(_accepting)return;
  const pass=$('su-pass').value;
  if(!pass||pass.length<8){showMsg('Password must be at least 8 characters.','err');return;}

  _accepting=true;
  const btn=$('su-btn');
  btn.textContent='Creating account…';
  btn.disabled=true;

  try{
    const{data,error}=await sb.auth.signUp({email:invitation.email,password:pass});
    if(error){
      if(error.message.toLowerCase().includes('already')||error.message.toLowerCase().includes('registered')){
        showMsg('An account already exists with this email. Please use the "I have an account" tab to sign in.','info');
        switchTab('signin');
        $('si-pass').focus();
        return;
      }
      throw error;
    }

    // FIX #3: handle the email-confirmation-required case properly.
    // If the project requires email confirmation, signUp returns no session and the user is stuck.
    // We try to sign them in immediately — if that succeeds, confirmation isn't required and we proceed.
    // If it fails, we explain clearly and tell them to come BACK to this link after confirming.
    if(!data.session){
      const{data:signInData,error:signInErr}=await sb.auth.signInWithPassword({email:invitation.email,password:pass});
      if(signInErr || !signInData.user){
        // Email confirmation is on. Save the token so they can resume after confirming.
        try{sessionStorage.setItem('civara_pending_invite_token',invitation.token);}catch(e){}
        showMsg('Account created. Please check your email to confirm your address, then come back to <strong>this same invitation link</strong> to finish joining '+orgName+'.','info');
        return;
      }
      // Sign-in worked — proceed to accept
      await acceptInvitation(signInData.user.id);
    } else {
      await acceptInvitation(data.user.id);
    }

    $('success-org').textContent=orgName;
    showOnly('success');
  }catch(e){
    showMsg('Sign-up failed: '+e.message,'err');
  }finally{
    _accepting=false;
    btn.textContent='Create account & accept invite';
    btn.disabled=false;
  }
}

async function doSignIn(){
  // FIX #2: re-entry guard
  if(_accepting)return;
  const pass=$('si-pass').value;
  if(!pass){showMsg('Please enter your password.','err');return;}

  _accepting=true;
  const btn=$('si-btn');
  btn.textContent='Signing in…';
  btn.disabled=true;

  try{
    const{data,error}=await sb.auth.signInWithPassword({email:invitation.email,password:pass});
    if(error)throw error;
    await acceptInvitation(data.user.id);
    $('success-org').textContent=orgName;
    showOnly('success');
  }catch(e){
    showMsg('Sign-in failed: '+e.message,'err');
  }finally{
    _accepting=false;
    btn.textContent='Sign in & accept invite';
    btn.disabled=false;
  }
}

boot();
</script>
</body>
</html>
