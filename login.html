<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GreenCRM — Sign in</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0f0a;--surface:#111811;--card:#182018;--border:#2a3a2a;--em:#10b981;--em2:#059669;--txt:#e2f5eb;--txt2:#9ab8a4;--txt3:#6a8f76;--red:#f87171;--radius:10px}
body{background:var(--bg);color:var(--txt);font-family:system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.logo{font-size:28px;font-weight:800;color:var(--em);letter-spacing:-.5px;margin-bottom:4px}
.logo span{color:var(--txt2);font-weight:400}
.sub{font-size:13px;color:var(--txt3);margin-bottom:8px}
.back-home{font-size:12px;color:var(--txt3);margin-bottom:20px;display:flex;align-items:center;gap:5px;transition:color .2s;cursor:pointer;text-decoration:none}
.back-home:hover{color:var(--em)}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;width:100%;max-width:400px}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{flex:1;background:none;color:var(--txt2);padding:9px;font-size:13px;font-weight:600;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s}
.tab.active{color:var(--em);border-bottom-color:var(--em)}
.pane{display:none}.pane.active{display:block}
.form-row{margin-bottom:13px}
label{display:block;font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
input,select{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--txt);border-radius:var(--radius);padding:10px 12px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:var(--em)}
.btn{width:100%;background:var(--em);color:#fff;padding:12px;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;border:none;margin-top:4px;transition:background .2s}
.btn:hover{background:var(--em2)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.msg{padding:10px 13px;border-radius:var(--radius);font-size:13px;margin-bottom:13px;display:none}
.msg-err{background:#2a1a1a;border:1px solid #5a2a2a;color:var(--red)}
.msg-ok{background:#1a3a2a;border:1px solid #2a5a3a;color:#34d399}
.hint{font-size:12px;color:var(--txt3);text-align:center;margin-top:13px}
.hint a{color:var(--em);cursor:pointer}
.divider{height:1px;background:var(--border);margin:14px 0}
.invited-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:var(--radius);padding:12px;margin-bottom:14px;font-size:13px;color:var(--txt2)}
</style>
</head>
<body>
<div class="logo">Green<span>CRM</span></div>
<div class="sub">Built for outcomes. Not admin.</div>
<a href="index.html" class="back-home">← Back to home</a>

<div class="card">
  <div class="tabs">
    <button class="tab active" id="tab-signin" onclick="showTab('signin')">Sign in</button>
    <button class="tab" id="tab-signup" onclick="showTab('signup')">Create account</button>
  </div>

  <!-- SIGN IN -->
  <div id="pane-signin" class="pane active">
    <div class="msg msg-err" id="si-err"></div>
    <div class="form-row"><label>Email</label><input type="email" id="si-email" placeholder="you@charity.org" autocomplete="email"/></div>
    <div class="form-row"><label>Password</label><input type="password" id="si-pass" placeholder="••••••••"/></div>
    <button class="btn" id="si-btn" onclick="doSignIn()">Sign in</button>
    <div class="hint">No account? <a onclick="showTab('signup')">Create one free →</a></div>
    <div class="hint" style="margin-top:6px"><a onclick="showForgot()" style="color:var(--txt3)">Forgot password?</a></div>
  </div>

  <!-- SIGN UP -->
  <div id="pane-signup" class="pane">
    <div class="msg msg-err" id="su-err"></div>
    <div class="msg msg-ok" id="su-ok"></div>
    <div id="invite-info" style="display:none" class="invited-box"></div>
    <div id="org-fields">
      <div style="font-size:11px;font-weight:700;color:var(--em);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Your organisation</div>
      <div class="form-row"><label>Organisation name</label><input id="su-org" placeholder="e.g. Waltham Forest CVS"/></div>
      <div class="form-row"><label>Organisation type</label>
        <select id="su-type">
          <option>Employability charity</option>
          <option>Circular economy / repair</option>
          <option>Community organisation</option>
          <option>Housing support</option>
          <option>Other charity / VCSE</option>
        </select>
      </div>
      <div class="divider"></div>
    </div>
    <div style="font-size:11px;font-weight:700;color:var(--em);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Your details</div>
    <div class="form-row"><label>Your name</label><input id="su-name" placeholder="Jane Smith"/></div>
    <div class="form-row"><label>Email</label><input type="email" id="su-email" placeholder="you@charity.org"/></div>
    <div class="form-row"><label>Password (min 8 characters)</label><input type="password" id="su-pass"/></div>
    <button class="btn" id="su-btn" onclick="doSignUp()">Create account</button>
    <div class="hint">Already have an account? <a onclick="showTab('signin')">Sign in →</a></div>
  </div>

  <!-- FORGOT -->
  <div id="pane-forgot" class="pane">
    <div class="msg msg-err" id="fg-err"></div>
    <div class="msg msg-ok" id="fg-ok"></div>
    <p style="font-size:13px;color:var(--txt2);margin-bottom:14px">Enter your email and we'll send a reset link.</p>
    <div class="form-row"><label>Email</label><input type="email" id="fg-email"/></div>
    <button class="btn" onclick="doReset()">Send reset link</button>
    <div class="hint"><a onclick="showTab('signin')">← Back to sign in</a></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SURL='https://nznfrxzgvcjhfsdaphyp.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56bmZyeHpndmNqaGZzZGFwaHlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MjQzNzcsImV4cCI6MjA5MjQwMDM3N30.vDlv1aVF4MlXPJ_VCWvyWWYYqovwJxUvNnwwUgYXSyw';
const sb=supabase.createClient(SURL,SKEY);
let inviteData=null;
const params=new URLSearchParams(window.location.search);
const inviteToken=params.get('invite');

// ── REDIRECT ──────────────────────────────────────────────────
// Always redirect with org_id in URL so app.html can find the org
async function redirectAfterAuth(userId){
  const{data:profile}=await sb.from('profiles').select('org_id,role').eq('id',userId).single();
  if(!profile?.org_id){
    showMsg('si-err','Account found but no organisation linked. Contact support.');
    return;
  }
  window.location.href='app.html?org_id='+profile.org_id;
}

// ── INIT ──────────────────────────────────────────────────────
async function init(){
  // If already logged in, redirect straight to app
  const{data:{session}}=await sb.auth.getSession();
  if(session){
    redirectAfterAuth(session.user.id);
    return;
  }

  // Handle invite token
  if(inviteToken){
    const{data:inv}=await sb.from('invites')
      .select('*,organisations(name)')
      .eq('token',inviteToken)
      .eq('accepted',false)
      .single();
    if(inv){
      inviteData=inv;
      showTab('signup');
      document.getElementById('org-fields').style.display='none';
      document.getElementById('su-email').value=inv.email;
      document.getElementById('su-email').readOnly=true;
      const roleColors={admin:'#10b981',manager:'#60a5fa',advisor:'#a78bfa','read-only':'#f59e0b'};
      document.getElementById('invite-info').style.display='block';
      document.getElementById('invite-info').innerHTML=`You've been invited to join <strong>${inv.organisations?.name||'an organisation'}</strong> as <strong style="color:${roleColors[inv.role]||'var(--em)'}">${inv.role}</strong>. Fill in your details to accept.`;
    }else{
      showTab('signup');
      document.getElementById('invite-info').style.display='block';
      document.getElementById('invite-info').innerHTML='⚠ This invite link has expired or already been used.';
      document.getElementById('su-btn').disabled=true;
    }
  }

  // Handle password reset redirect from email
  const hash=new URLSearchParams(window.location.hash.replace('#',''));
  if(hash.get('type')==='recovery'){
    showForgot();
    document.getElementById('pane-forgot').innerHTML=`
      <div class="msg msg-ok" id="pw-ok"></div>
      <div class="msg msg-err" id="pw-err"></div>
      <p style="font-size:13px;color:var(--txt2);margin-bottom:14px">Enter your new password.</p>
      <div class="form-row"><label>New password</label><input type="password" id="new-pass" placeholder="Min 8 characters"/></div>
      <button class="btn" onclick="doUpdatePassword()">Set new password</button>`;
  }
}

// ── SIGN IN ───────────────────────────────────────────────────
async function doSignIn(){
  const email=document.getElementById('si-email').value.trim();
  const pass=document.getElementById('si-pass').value;
  hideMsg('si-err');
  if(!email||!pass){showMsg('si-err','Please enter your email and password.');return;}
  setLoad('si-btn',true,'Sign in');
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){setLoad('si-btn',false,'Sign in');showMsg('si-err',error.message);return;}
  await redirectAfterAuth(data.user.id);
}

// ── SIGN UP ───────────────────────────────────────────────────
async function doSignUp(){
  const name=document.getElementById('su-name').value.trim();
  const email=document.getElementById('su-email').value.trim();
  const pass=document.getElementById('su-pass').value;
  const org=inviteData?null:document.getElementById('su-org').value.trim();
  const orgType=inviteData?null:document.getElementById('su-type').value;
  hideMsg('su-err','su-ok');
  if(!name||!email||!pass){showMsg('su-err','Please fill in all fields.');return;}
  if(!inviteData&&!org){showMsg('su-err','Please enter your organisation name.');return;}
  if(pass.length<8){showMsg('su-err','Password must be at least 8 characters.');return;}
  setLoad('su-btn',true,'Create account');

  // 1. Create auth account
  const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
  if(error){setLoad('su-btn',false,'Create account');showMsg('su-err',error.message);return;}
  const uid=data?.user?.id;
  if(!uid){setLoad('su-btn',false,'Create account');showMsg('su-err','Signup failed — please try again.');return;}

  let orgId;

  if(inviteData){
    // Joining an existing org via invite
    orgId=inviteData.org_id;
    await sb.from('profiles').upsert({
      id:uid,full_name:name,email,
      org_id:orgId,role:inviteData.role,status:'active'
    });
    await sb.from('invites').update({accepted:true}).eq('token',inviteToken);

  }else{
    // Creating a brand new org
    const{data:orgData,error:orgErr}=await sb.from('organisations').insert({
      name:org,
      sector:orgType,
      owner_id:uid,
      plan:'free',
      status:'active',
      modules:{participants:true,volunteers:true,events:true,employers:false,circular:false,funders:false}
    }).select().single();

    if(orgErr){
      setLoad('su-btn',false,'Create account');
      showMsg('su-err','Could not create organisation: '+orgErr.message);
      return;
    }

    orgId=orgData.id;

    await sb.from('profiles').upsert({
      id:uid,full_name:name,email,
      org_id:orgId,role:'admin',status:'active'
    });
  }

  showMsg('su-ok','✓ Account created! Signing you in…');

  // 2. Sign in immediately (no email confirmation required in most Supabase setups)
  setTimeout(async()=>{
    const{data:signInData,error:signInErr}=await sb.auth.signInWithPassword({email,password:pass});
    if(signInErr){
      // Email confirmation might be required
      showMsg('su-ok','✓ Account created! Check your email to confirm, then sign in.');
      setLoad('su-btn',false,'Create account');
      return;
    }
    window.location.href='app.html?org_id='+orgId;
  },1000);
}

// ── PASSWORD RESET ────────────────────────────────────────────
async function doReset(){
  const email=document.getElementById('fg-email').value.trim();
  hideMsg('fg-err','fg-ok');
  if(!email){showMsg('fg-err','Please enter your email.');return;}
  const{error}=await sb.auth.resetPasswordForEmail(email,{
    redirectTo:window.location.origin+'/login.html'
  });
  if(error){showMsg('fg-err',error.message);return;}
  showMsg('fg-ok','Reset link sent! Check your inbox.');
}

async function doUpdatePassword(){
  const pass=document.getElementById('new-pass').value;
  if(pass.length<8){showMsg('pw-err','Password must be at least 8 characters.');return;}
  const{error}=await sb.auth.updateUser({password:pass});
  if(error){showMsg('pw-err',error.message);return;}
  showMsg('pw-ok','✓ Password updated! Redirecting…');
  setTimeout(()=>window.location.href='login.html',1500);
}

// ── HELPERS ───────────────────────────────────────────────────
function showTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+t)?.classList.add('active');
  document.getElementById('pane-'+t).classList.add('active');
}
function showForgot(){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-forgot').classList.add('active');
}
function showMsg(id,msg){const e=document.getElementById(id);if(!e)return;e.textContent=msg;e.style.display='block';}
function hideMsg(...ids){ids.forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});}
function setLoad(id,on,lbl){const b=document.getElementById(id);if(!b)return;b.disabled=on;b.textContent=on?'Please wait…':lbl;}

document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  const active=document.querySelector('.pane.active')?.id;
  if(active==='pane-signin')doSignIn();
  else if(active==='pane-signup')doSignUp();
  else if(active==='pane-forgot')doReset();
});

init();
</script>
</body>
</html>
